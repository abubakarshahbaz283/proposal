<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Marry Me? Aliya 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6d9 50%, #ff69b4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: gradientShift 4s ease infinite alternate;
        }

        @keyframes gradientShift {
            from { background: linear-gradient(135deg, #ffc0cb 0%, #ffb6d9 50%, #ff69b4 100%); }
            to { background: linear-gradient(135deg, #ff69b4 0%, #ffb6d9 50%, #ffc0cb 100%); }
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .hearts-flying {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .heart-float {
            position: absolute;
            font-size: 3rem;
            animation: float-up 3s ease-in forwards;
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-500px) rotate(360deg);
                opacity: 0;
            }
        }

        .content {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 50px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(255, 20, 147, 0.4);
            animation: slideUp 0.8s ease-out;
            max-width: 600px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ring {
            font-size: 6rem;
            display: inline-block;
            animation: spin 2s linear infinite;
            margin: 20px 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        h1 {
            font-size: 3.5rem;
            color: #ff1493;
            margin-bottom: 20px;
            animation: bounce 1.5s ease-in-out infinite;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.3);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .question {
            font-size: 2rem;
            color: #ff69b4;
            margin: 30px 0;
            font-weight: bold;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hearts-row {
            font-size: 2.5rem;
            margin: 20px 0;
            letter-spacing: 10px;
            animation: float-heart 3s ease-in-out infinite;
        }

        @keyframes float-heart {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .button-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 35px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .yes-btn {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.5);
            transform: scale(1);
        }

        .yes-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 15px 40px rgba(255, 20, 147, 0.7);
        }

        .yes-btn:active {
            transform: scale(1);
        }

        .no-btn {
            background: rgba(255, 200, 200, 0.8);
            color: #ff1493;
            position: relative;
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.3);
        }

        .no-btn:hover {
            background: rgba(255, 180, 180, 0.8);
            transform: translateX(150px);
        }

        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.98);
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 30px 80px rgba(255, 20, 147, 0.6);
            display: none;
        }

        .celebration.show {
            display: block;
            animation: celebrateScale 1s ease-out forwards;
        }

        @keyframes celebrateScale {
            from {
                transform: translate(-50%, -50%) scale(0) rotate(-20deg);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .celebration h2 {
            font-size: 3rem;
            color: #ff1493;
            margin-bottom: 20px;
            animation: wiggle 0.5s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .celebration p {
            font-size: 1.8rem;
            color: #ff69b4;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff1493;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .question { font-size: 1.5rem; }
            .ring { font-size: 4rem; }
            .content { padding: 40px 30px; }
            button { padding: 12px 25px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="hearts-flying" id="heartsFlying"></div>

    <div class="content">
        <div class="ring">💍</div>
        <h1>Noorrryyy</h1>
        <div class="hearts-row">💕 💕 💕</div>
        <div class="question">Will you marry me?</div>
        <div class="hearts-row">💕 💕 💕</div>

        <div class="button-container">
            <button class="yes-btn" onclick="celebrate()">YES! 💕</button>
            <button class="no-btn" onclick="runaway(event)">No</button>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <h2>🎉 YES! 🎉</h2>
        <p>I'm the happiest person alive! 💕💍✨</p>
        <p style="font-size: 1.5rem; margin-top: 15px;">I love you so much! 💕</p>
    </div>

    <script>
        function celebrate() {
            document.getElementById('celebration').classList.add('show');

            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    createFloatingHeart();
                }, i * 100);
            }

            for (let i = 0; i < 100; i++) {
                createConfetti();
            }

            playSound();
        }

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-float';
            heart.textContent = '💕';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.bottom = '-50px';
            heart.style.animationDelay = Math.random() * 0.5 + 's';
            document.getElementById('heartsFlying').appendChild(heart);
            setTimeout(() => heart.remove(), 3500);
        }

        function createConfetti() {
            const colors = ['#ff1493', '#ff69b4', '#ffc0cb', '#ffb6d9', '#ffd700'];
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * window.innerWidth + 'px';
            confetti.style.top = Math.random() * window.innerHeight + 'px';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animation = `float-up ${2 + Math.random() * 2}s ease-in forwards`;
            confetti.style.width = (5 + Math.random() * 10) + 'px';
            confetti.style.height = confetti.style.width;
            confetti.style.borderRadius = '50%';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4500);
        }

        function runaway(event) {
            const btn = event.target.closest('button');
            const randomX = (Math.random() - 0.5) * 400;
            const randomY = (Math.random() - 0.5) * 400;
            btn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        function playSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const notes = [523.25, 659.25, 783.99];
                let time = audioContext.currentTime;

                notes.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, time + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + i * 0.15 + 0.1);
                    osc.start(time + i * 0.15);
                    osc.stop(time + i * 0.15 + 0.1);
                });
            } catch (e) {}
        }

        document.querySelector('.no-btn').addEventListener('mouseenter', runaway);
        document.querySelector('.no-btn').addEventListener('touchstart', runaway);
    </script>
</body>
</html>
